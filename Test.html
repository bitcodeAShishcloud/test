<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Drive Upload - Ashish Gupta</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4285f4;
            --primary-dark: #3367d6;
            --success: #34a853;
            --warning: #fbbc04;
            --danger: #ea4335;
            --dark: #202124;
            --light: #f8f9fa;
            --gray: #5f6368;
            --light-gray: #e8eaed;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
            --shadow-lg: 0 8px 20px rgba(0,0,0,0.15);
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 500px;
            padding: 30px;
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            color: var(--primary);
            font-size: 1.8rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header p {
            color: var(--gray);
            font-size: 0.9rem;
        }

        .settings-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--light);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--gray);
            transition: all 0.3s;
        }

        .settings-btn:hover {
            background: var(--primary);
            color: white;
            transform: rotate(90deg);
        }

        .auth-section {
            text-align: center;
            padding: 20px 0;
            margin-bottom: 20px;
        }

        .login-btn {
            background: white;
            color: var(--dark);
            border: 2px solid var(--light-gray);
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
        }

        .login-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
        }

        .login-btn i { color: var(--danger); }

        .logged-in {
            display: none;
            color: var(--success);
            font-weight: 600;
            padding: 10px;
            background: #e6f4ea;
            border-radius: 8px;
        }

        .form-group { margin-bottom: 18px; }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: var(--dark);
            font-size: 0.95rem;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--light-gray);
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(66, 133, 244, 0.1);
        }

        .subject-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
            max-height: 150px;
            overflow-y: auto;
            padding: 10px;
            background: var(--light);
            border-radius: 8px;
        }

        .subject-tag {
            background: var(--primary);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .subject-tag:hover {
            background: var(--primary-dark);
            transform: scale(1.05);
        }

        .subject-tag.active {
            background: var(--success);
            box-shadow: 0 2px 8px rgba(52, 168, 83, 0.3);
        }

        .subject-tag .remove {
            background: rgba(255,255,255,0.3);
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }

        .subject-tag .remove:hover {
            background: var(--danger);
        }

        .file-info {
            background: var(--light);
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
        }

        .file-info.show { display: block; }

        .file-info p {
            font-size: 0.9rem;
            color: var(--gray);
            margin-bottom: 5px;
        }

        .file-info strong { color: var(--dark); }

        .upload-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(120deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .upload-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .upload-btn:disabled {
            background: var(--light-gray);
            cursor: not-allowed;
            transform: none;
        }

        .status {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }

        .status.show { display: block; }
        .status.success { background: #e6f4ea; color: var(--success); }
        .status.error { background: #fce8e6; color: var(--danger); }
        .status.info { background: #e8f0fe; color: var(--primary); }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
        }

        .modal.show { display: flex; }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: var(--radius);
            width: 90%;
            max-width: 400px;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--gray);
        }

        .modal h3 {
            color: var(--dark);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .save-btn {
            width: 100%;
            padding: 12px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
        }

        .info-box {
            background: #e8f0fe;
            border-left: 4px solid var(--primary);
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: var(--dark);
        }

        .info-box i { margin-right: 8px; color: var(--primary); }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid var(--light-gray);
        }

        .stat-item {
            text-align: center;
            padding: 10px;
            background: var(--light);
            border-radius: 8px;
        }

        .stat-item .number {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-item .label {
            font-size: 0.8rem;
            color: var(--gray);
            margin-top: 5px;
        }

        @media (max-width: 480px) {
            .container { padding: 20px; }
            .header h1 { font-size: 1.5rem; }
            .upload-btn { font-size: 1rem; padding: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="settings-btn" onclick="openSettings()">
            <i class="fas fa-cog"></i>
        </button>

        <div class="header">
            <h1><i class="fas fa-cloud-upload-alt"></i> My Drive Upload</h1>
            <p>Upload files directly to YOUR Google Drive</p>
        </div>

        <div class="info-box">
            <i class="fas fa-info-circle"></i>
            <strong>Note:</strong> Google requires sign-in for security. Your files go directly to YOUR Drive, not our servers.
        </div>

        <div class="auth-section">
            <button class="login-btn" id="loginBtn" onclick="handleAuthClick()">
                <i class="fab fa-google"></i>
                <span>Sign in with Google</span>
            </button>
            <div class="logged-in" id="loggedIn">
                <i class="fas fa-check-circle"></i>
                <span id="userEmail">Logged in!</span>
            </div>
        </div>

        <form id="uploadForm" onsubmit="handleUpload(event)">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Your Name</label>
                <input type="text" id="pName" placeholder="Enter your name" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-folder"></i> Create/Select Subject</label>
                <input type="text" id="subjectInput" placeholder="Type subject name (e.g., Maths, Physics)" onkeypress="handleEnter(event)">
                <div class="subject-list" id="subjectList">
                    <!-- Saved subjects will appear here -->
                </div>
                <input type="hidden" id="selectedSubject">
            </div>

            <div class="form-group">
                <label><i class="fas fa-file"></i> Select File</label>
                <input type="file" id="fileInput" required onchange="showFileInfo()">
                <div class="file-info" id="fileInfo"></div>
            </div>

            <button type="submit" class="upload-btn" id="uploadBtn" disabled>
                <i class="fas fa-upload"></i>
                <span>Upload to Drive</span>
            </button>
        </form>

        <div class="status" id="status"></div>

        <div class="stats">
            <div class="stat-item">
                <div class="number" id="totalUploads">0</div>
                <div class="label">Uploads</div>
            </div>
            <div class="stat-item">
                <div class="number" id="totalSubjects">0</div>
                <div class="label">Subjects</div>
            </div>
            <div class="stat-item">
                <div class="number" id="storageUsed">0 KB</div>
                <div class="label">Local Data</div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeSettings()">&times;</button>
            <h3><i class="fas fa-cog"></i> Settings</h3>
            <div class="form-group">
                <label>Google Drive Folder ID/URL</label>
                <input type="text" id="driveFolderId" placeholder="Paste folder link or ID">
                <small style="color: var(--gray); font-size: 0.8rem;">
                    Create a folder in Drive → Share → Copy link → Paste here
                </small>
            </div>
            <button class="save-btn" onclick="saveSettings()">
                <i class="fas fa-save"></i> Save Settings
            </button>
        </div>
    </div>

    <!-- Google API Scripts -->
    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>

    <script>
        // Configuration
        const CLIENT_ID = '1073292672496-r70b2d6dj8rivtqard3t4g2th7g3ua58.apps.googleusercontent.com';
        const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';

        let tokenClient, gapiInited = false, gisInited = false;

        // Initialize on load
        window.onload = function() {
            loadSavedData();
            updateStats();
            checkExistingAuth();
        };

        // Load saved data from localStorage
        function loadSavedData() {
            // Load subjects
            const subjects = JSON.parse(localStorage.getItem('mySubjects') || '[]');
            renderSubjectList(subjects);

            // Load folder ID
            const folderId = localStorage.getItem('driveFolderId');
            if (folderId) {
                document.getElementById('driveFolderId').value = folderId;
            }

            // Load user name
            const userName = localStorage.getItem('userName');
            if (userName) {
                document.getElementById('pName').value = userName;
            }
        }

        // Render subject tags
        function renderSubjectList(subjects) {
            const list = document.getElementById('subjectList');
            list.innerHTML = '';

            subjects.forEach((subject, index) => {
                const tag = document.createElement('div');
                tag.className = 'subject-tag';
                tag.innerHTML = `
                    ${subject}
                    <span class="remove" onclick="removeSubject(${index}, event)">×</span>
                `;
                tag.onclick = (e) => {
                    if (!e.target.classList.contains('remove')) {
                        selectSubject(subject, tag);
                    }
                };
                list.appendChild(tag);
            });

            document.getElementById('totalSubjects').textContent = subjects.length;
        }

        // Select subject
        function selectSubject(subject, element) {
            document.querySelectorAll('.subject-tag').forEach(t => t.classList.remove('active'));
            element.classList.add('active');
            document.getElementById('selectedSubject').value = subject;
            document.getElementById('subjectInput').value = subject;
        }

        // Remove subject
        function removeSubject(index, event) {
            event.stopPropagation();
            const subjects = JSON.parse(localStorage.getItem('mySubjects') || '[]');
            subjects.splice(index, 1);
            localStorage.setItem('mySubjects', JSON.stringify(subjects));
            renderSubjectList(subjects);
            updateStats();
        }

        // Handle Enter key
        function handleEnter(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                addSubject();
            }
        }

        // Add new subject
        function addSubject() {
            const input = document.getElementById('subjectInput');
            const subject = input.value.trim();

            if (!subject) return;

            const subjects = JSON.parse(localStorage.getItem('mySubjects') || '[]');
            
            if (!subjects.includes(subject)) {
                subjects.push(subject);
                localStorage.setItem('mySubjects', JSON.stringify(subjects));
                renderSubjectList(subjects);
                selectSubject(subject, document.querySelector('.subject-tag:last-child'));
                updateStats();
            } else {
                const tag = Array.from(document.querySelectorAll('.subject-tag'))
                    .find(t => t.textContent.trim().startsWith(subject));
                if (tag) selectSubject(subject, tag);
            }

            input.value = '';
        }

        // Show file info
        function showFileInfo() {
            const file = document.getElementById('fileInput').files[0];
            const info = document.getElementById('fileInfo');

            if (file) {
                const size = (file.size / 1024).toFixed(2);
                info.innerHTML = `
                    <p><strong>File:</strong> ${file.name}</p>
                    <p><strong>Size:</strong> ${size} KB</p>
                    <p><strong>Type:</strong> ${file.type || 'Unknown'}</p>
                `;
                info.classList.add('show');
            } else {
                info.classList.remove('show');
            }
        }

        // Google API Initialization
        function gapiLoaded() {
            gapi.load('client', initializeGapiClient);
        }

        async function initializeGapiClient() {
            await gapi.client.init({
                discoveryDocs: [DISCOVERY_DOC]
            });
            gapiInited = true;
            checkAuthStatus();
        }

        function gisLoaded() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: '',
            });
            gisInited = true;
            checkAuthStatus();
        }

        function checkAuthStatus() {
            if (gapiInited && gisInited) {
                checkExistingAuth();
            }
        }

        function checkExistingAuth() {
            const token = gapi.client.getToken();
            if (token !== null) {
                showLoggedInState();
            }
        }

        function handleAuthClick() {
            tokenClient.callback = async (resp) => {
                if (resp.error) throw resp;
                showLoggedInState();
            };

            if (gapi.client.getToken() === null) {
                tokenClient.requestAccessToken({ prompt: 'consent' });
            } else {
                tokenClient.requestAccessToken({ prompt: '' });
            }
        }

        function showLoggedInState() {
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('loggedIn').style.display = 'block';
            document.getElementById('uploadBtn').disabled = false;
            
            // Get user email from token
            const token = gapi.client.getToken();
            if (token) {
                const userInfo = atob(token.id_token.split('.')[1]);
                const email = JSON.parse(userInfo).email;
                document.getElementById('userEmail').textContent = email;
                localStorage.setItem('userEmail', email);
            }
        }

        // Upload Handler
        async function handleUpload(e) {
            e.preventDefault();
            const status = document.getElementById('status');
            status.className = 'status info show';
            status.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';

            try {
                const pName = document.getElementById('pName').value.trim();
                const subject = document.getElementById('selectedSubject').value || document.getElementById('subjectInput').value.trim();
                const file = document.getElementById('fileInput').files[0];
                const folderId = localStorage.getItem('driveFolderId');

                // Validation
                if (!subject) {
                    throw new Error('Please create or select a subject');
                }
                if (!folderId) {
                    throw new Error('Please set Drive Folder ID in Settings ⚙️');
                }
                if (!file) {
                    throw new Error('Please select a file');
                }

                // Save name for next time
                localStorage.setItem('userName', pName);

                // Find or create subject folder
                status.innerHTML = '<i class="fas fa-folder"></i> Checking folder...';
                
                const listResponse = await gapi.client.drive.files.list({
                    q: `'${folderId}' in parents and name='${subject}' and mimeType='application/vnd.google-apps.folder' and trashed=false`,
                    fields: 'files(id, name)',
                    spaces: 'drive'
                });

                let targetFolderId = folderId;
                const files = listResponse.result?.files || [];

                if (files.length > 0) {
                    targetFolderId = files[0].id;
                } else {
                    status.innerHTML = '<i class="fas fa-plus-circle"></i> Creating folder...';
                    const createResponse = await gapi.client.drive.files.create({
                        resource: {
                            name: subject,
                            mimeType: 'application/vnd.google-apps.folder',
                            parents: [folderId]
                        },
                        fields: 'id'
                    });
                    targetFolderId = createResponse.result.id;
                }

                // Upload file
                status.innerHTML = '<i class="fas fa-upload"></i> Uploading file...';
                
                const accessToken = gapi.client.getToken().access_token;
                const form = new FormData();
                
                const metadata = {
                    name: `${pName}_${file.name}`,
                    parents: [targetFolderId]
                };

                form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
                form.append('file', file);

                const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + accessToken },
                    body: form
                });

                const result = await response.json();

                if (response.ok && result.id) {
                    // Save upload record
                    saveUploadRecord(pName, subject, file.name);
                    
                    status.className = 'status success show';
                    status.innerHTML = `
                        <i class="fas fa-check-circle"></i> 
                        <strong>Success!</strong><br>
                        File uploaded to "${subject}" folder
                    `;
                    
                    // Reset form but keep subjects
                    document.getElementById('fileInput').value = '';
                    document.getElementById('fileInfo').classList.remove('show');
                    document.getElementById('subjectInput').value = '';
                    document.getElementById('selectedSubject').value = '';
                    document.querySelectorAll('.subject-tag').forEach(t => t.classList.remove('active'));
                    
                    updateStats();
                } else {
                    throw new Error(result.error?.message || 'Upload failed');
                }

            } catch (err) {
                console.error(err);
                status.className = 'status error show';
                status.innerHTML = `<i class="fas fa-exclamation-circle"></i> Error: ${err.message}`;
            }
        }

        // Save upload record to localStorage
        function saveUploadRecord(name, subject, filename) {
            const records = JSON.parse(localStorage.getItem('uploadRecords') || '[]');
            records.unshift({
                name: name,
                subject: subject,
                filename: filename,
                date: new Date().toISOString()
            });
            // Keep only last 100 records to save space
            if (records.length > 100) records.pop();
            localStorage.setItem('uploadRecords', JSON.stringify(records));
        }

        // Update statistics
        function updateStats() {
            const records = JSON.parse(localStorage.getItem('uploadRecords') || '[]');
            const subjects = JSON.parse(localStorage.getItem('mySubjects') || '[]');
            
            document.getElementById('totalUploads').textContent = records.length;
            document.getElementById('totalSubjects').textContent = subjects.length;

            // Calculate localStorage usage
            let totalSize = 0;
            for (let key in localStorage) {
                if (localStorage.hasOwnProperty(key)) {
                    totalSize += localStorage[key].length + key.length;
                }
            }
            const sizeKB = (totalSize / 1024).toFixed(2);
            document.getElementById('storageUsed').textContent = `${sizeKB} KB`;
        }

        // Settings Modal
        function openSettings() {
            document.getElementById('settingsModal').classList.add('show');
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.remove('show');
        }

        function saveSettings() {
            let url = document.getElementById('driveFolderId').value.trim();
            let id = url;

            if (url.includes('/folders/')) {
                id = url.split('/folders/')[1].split('?')[0].trim();
            }

            localStorage.setItem('driveFolderId', id);
            
            const status = document.getElementById('status');
            status.className = 'status success show';
            status.innerHTML = '<i class="fas fa-check-circle"></i> Settings saved!';
            
            closeSettings();
            setTimeout(() => status.classList.remove('show'), 3000);
        }

        // Close modal on outside click
        window.onclick = function(event) {
            const modal = document.getElementById('settingsModal');
            if (event.target === modal) {
                closeSettings();
            }
        };
    </script>
</body>
</html>
