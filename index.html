<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure File Upload - Ashish Gupta</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4285f4;
            --bg: #f4f6f8;
            --text: #333;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Settings Button */
        .settings-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 24px;
            color: #555;
        }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            margin-top: 40px;
        }

        h2 { text-align: center; color: var(--primary); margin-bottom: 20px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; }
        
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }

        button.submit-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        button.submit-btn:hover { background-color: #3367d6; }
        button.submit-btn:disabled { background-color: #ccc; cursor: not-allowed; }

        /* Control buttons for uploads */
        .upload-controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .upload-controls button {
            flex: 1;
            padding: 8px;
            border-radius: 4px;
            border: none;
            color: white;
            cursor: pointer;
        }
        
        .btn-pause { background-color: #f44336; }
        .btn-resume { background-color: #4CAF50; }
        .btn-cancel { background-color: #9E9E9E; }

        /* Progress bar */
        .progress-container {
            margin-top: 15px;
            display: none;
        }
        
        .progress-bar {
            height: 10px;
            background-color: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
        }
        
        .progress {
            height: 100%;
            background-color: var(--primary);
            width: 0%;
            transition: width 0.3s;
        }
        
        .progress-text {
            text-align: center;
            margin-top: 5px;
            font-size: 12px;
            color: #666;
        }

        /* Footer */
        .footer {
            margin-top: auto;
            text-align: center;
            font-size: 12px;
            color: #666;
            padding: 20px;
            border-top: 1px solid #ddd;
            width: 100%;
            max-width: 500px;
        }

        .footer a { color: var(--primary); text-decoration: none; }
        .security-msg { margin-top: 10px; font-style: italic; color: #28a745; }

        /* Modal */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 100; 
            left: 0; top: 0; 
            width: 100%; height: 100%; 
            background-color: rgba(0,0,0,0.5); 
        }
        .modal-content {
            background-color: white;
            margin: 15% auto;
            padding: 20px;
            border-radius: 8px;
            width: 80%;
            max-width: 400px;
        }
        .close { float: right; font-size: 24px; cursor: pointer; }

        #status { margin-top: 10px; text-align: center; font-size: 14px; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>

    <!-- Settings Button -->
    <button class="settings-btn" onclick="openSettings()">⚙️</button>

    <div class="container">
        <h2>📁 Secure File Upload</h2>
        
        <!-- Login Status -->
        <div id="auth-status" style="text-align: center; margin-bottom: 15px;">
            <button id="login-btn" onclick="handleAuthClick()">Sign in with Google</button>
            <span id="user-name" style="display:none; color: green;">Logged in!</span>
        </div>

        <form id="uploadForm" onsubmit="handleUpload(event)">
            <div class="form-group">
                <label>Your Name</label>
                <input type="text" id="pName" required placeholder="Enter your name">
            </div>

            <div class="form-group">
                <label>Subject</label>
                <select id="subjectSelect" onchange="checkOther(this)" required>
                    <option value="" disabled selected>Select Subject</option>
                    <option value="Hacking">Hacking</option>
                    <option value="Ethical Hacking">Ethical Hacking</option>
                    <option value="DBMS">DBMS</option>
                    <option value="AICE">AICE</option>
                    <option value="CTI">CTI</option>
                    <option value="DSA">DSA</option>
                    <option value="Web Technology">Web Technology</option>
                    <option value="UPSC">UPSC</option>
                    <option value="English">English</option>
                    <option value="Mathematics">Mathematics</option>
                    <option value="Science">Science</option>
                    <option value="History">History</option>
                    <option value="Geography">Geography</option>
                    <option value="Politics">Politics</option>
                    <option value="Other">Other (Create New)</option>
                </select>
            </div>

            <!-- Hidden input for custom subject -->
            <div class="form-group" id="customSubjectDiv" style="display:none;">
                <label>Enter New Subject Name</label>
                <input type="text" id="customSubject" placeholder="e.g. Physics, Coding">
            </div>

            <div class="form-group">
                <label>File Type</label>
                <select id="fileType">
                    <option value="application/pdf">PDF</option>
                    <option value="application/vnd.ms-powerpoint">PPT</option>
                    <option value="text/plain">TXT</option>
                    <option value="application/msword">Word File</option>
                    <option value="image/*">Image</option>
                    <option value="video/*">Video</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label>Select File</label>
                <input type="file" id="fileInput" required>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn" disabled>Upload to Drive</button>
            
            <!-- Progress bar and controls -->
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar">
                    <div class="progress" id="progressBar"></div>
                </div>
                <div class="progress-text" id="progressText">0%</div>
                <div class="upload-controls">
                    <button type="button" class="btn-pause" id="pauseBtn" onclick="pauseUpload()">Pause</button>
                    <button type="button" class="btn-resume" id="resumeBtn" style="display:none" onclick="resumeUpload()">Resume</button>
                    <button type="button" class="btn-cancel" id="cancelBtn" onclick="cancelUpload()">Cancel</button>
                </div>
            </div>
        </form>
        <div id="status"></div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeSettings()">&times;</span>
            <h3>Settings</h3>
            <div class="form-group">
                <label>Google Drive Folder ID / URL</label>
                <input type="text" id="driveFolderId" placeholder="Paste Folder URL or ID here">
                <small style="color: #666;">Only the owner needs to set this.</small>
            </div>
            <button class="submit-btn" onclick="saveSettings()">Save Settings</button>
        </div>
    </div>

    <div class="footer">
        <p>Page Owner: <strong>Ashish Gupta</strong> | <a href="https://github.com/bitcodeAShishcloud" target="_blank">GitHub Profile</a></p>
        <p class="security-msg">🔒 Fully Secure: Your data is uploaded directly to your private Google Drive. It does not pass through any third-party server.</p>
    </div>

    <!-- Google API Script -->
    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>

    <script>
        // --- CONFIGURATION ---
        const CLIENT_ID = '1073292672496-r70b2d6dj8rivtqard3t4g2th7g3ua58.apps.googleusercontent.com'; 
        const API_KEY = 'YOUR_API_KEY_HERE'; // Optional but recommended
        const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';
        const CHUNK_SIZE = 5 * 1024 * 1024; // 5MB chunks

        let tokenClient;
        let gapiInited = false;
        let gisInited = false;
        let uploadState = null;
        let isPaused = false;
        let isCancelled = false;
        let serviceWorkerReady = false;
        let port;
        let uploadId = null;
        let currentFile = null;

        // --- SERVICE WORKER SETUP ---
        async function setupServiceWorker() {
            if ('serviceWorker' in navigator) {
                try {
                    const registration = await navigator.serviceWorker.register('/sw.js', {
                        scope: '/'
                    });
                    
                    // Create a message channel to communicate with the service worker
                    const channel = new MessageChannel();
                    port = channel.port1;
                    
                    port.onmessage = handleServiceWorkerMessage;
                    
                    // Send the other port to the service worker
                    navigator.serviceWorker.controller.postMessage(
                        { type: 'init-upload-channel' },
                        [channel.port2]
                    );
                    
                    serviceWorkerReady = true;
                    console.log('Service Worker registered and channel established');
                    
                    // Check for existing uploads
                    checkExistingUploads();
                    
                    return true;
                } catch (error) {
                    console.error('Service Worker registration failed:', error);
                    return false;
                }
            }
            return false;
        }

        function handleServiceWorkerMessage(event) {
            const { type, data } = event.data;
            
            switch (type) {
                case 'upload-progress':
                    updateProgress(data.progress, data.bytesUploaded, data.totalBytes);
                    break;
                case 'upload-complete':
                    handleUploadComplete(data);
                    break;
                case 'upload-error':
                    handleUploadError(data.error);
                    break;
                case 'upload-paused':
                    handleUploadPaused();
                    break;
                case 'upload-resumed':
                    handleUploadResumed();
                    break;
                case 'upload-initial-response':
                    handleUploadInitialResponse(data);
                    break;
            }
        }

        function handleUploadInitialResponse(data) {
            uploadId = data.uploadId;
            currentFile = data.file;
            localStorage.setItem('currentUpload', JSON.stringify({
                uploadId,
                fileName: currentFile.name,
                fileSize: currentFile.size,
                subject: data.subject,
                pName: data.pName
            }));
        }

        function handleUploadComplete(data) {
            uploadState = null;
            localStorage.removeItem('currentUpload');
            document.getElementById('progressContainer').style.display = 'none';
            document.getElementById('status').innerHTML = `✅ Success! File uploaded to '${data.subject}' folder.`;
            document.getElementById('status').className = "success";
            document.getElementById('uploadForm').reset();
            document.getElementById('submitBtn').disabled = false;
        }

        function handleUploadError(error) {
            uploadState = null;
            isPaused = false;
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('status').innerHTML = `❌ Error: ${error}`;
            document.getElementById('status').className = "error";
        }

        function handleUploadPaused() {
            isPaused = true;
            document.getElementById('pauseBtn').style.display = 'none';
            document.getElementById('resumeBtn').style.display = 'block';
            document.getElementById('status').innerHTML = '⏸️ Upload paused. Click Resume to continue.';
        }

        function handleUploadResumed() {
            isPaused = false;
            document.getElementById('pauseBtn').style.display = 'block';
            document.getElementById('resumeBtn').style.display = 'none';
            document.getElementById('status').innerHTML = '🔄 Upload resumed...';
        }

        function updateProgress(progress, bytesUploaded, totalBytes) {
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');
            
            progressBar.style.width = `${progress}%`;
            progressText.textContent = `${progress.toFixed(1)}% (${formatBytes(bytesUploaded)} / ${formatBytes(totalBytes)})`;
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // --- LOCAL STORAGE FOR SUBJECTS ---
        function loadSubjects() {
            const saved = localStorage.getItem('customSubjects');
            if (saved) {
                const subjects = JSON.parse(saved);
                const select = document.getElementById('subjectSelect');
                // Remove "Other" temporarily to insert new ones before it
                select.remove(select.length - 1); 
                subjects.forEach(sub => {
                    const opt = document.createElement('option');
                    opt.value = sub;
                    opt.innerText = sub;
                    select.appendChild(opt);
                });
                // Add "Other" back
                const otherOpt = document.createElement('option');
                otherOpt.value = "Other";
                otherOpt.innerText = "Other (Create New)";
                select.appendChild(otherOpt);
            }
        }
        loadSubjects();

        // --- UI LOGIC ---
        function checkOther(select) {
            const customDiv = document.getElementById('customSubjectDiv');
            if (select.value === 'Other') {
                customDiv.style.display = 'block';
                document.getElementById('customSubject').required = true;
            } else {
                customDiv.style.display = 'none';
                document.getElementById('customSubject').required = false;
            }
        }

        function openSettings() { document.getElementById('settingsModal').style.display = "block"; }
        function closeSettings() { document.getElementById('settingsModal').style.display = "none"; }
        
        function saveSettings() {
            const url = document.getElementById('driveFolderId').value;
            // Extract ID if URL is pasted
            let id = url;
            if(url.includes('/folders/')) {
                id = url.split('/folders/')[1].split('?')[0];
            }
            localStorage.setItem('driveFolderId', id);
            alert('Settings Saved!');
            closeSettings();
        }

        // --- GOOGLE API LOGIC ---
        function gapiLoaded() {
            gapi.load('client', initializeGapiClient);
        }

        async function initializeGapiClient() {
            await gapi.client.init({
                apiKey: API_KEY,
                discoveryDocs: [DISCOVERY_DOC],
            });
            gapiInited = true;
            maybeEnableButtons();
        }

        function gisLoaded() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: '', // defined later
            });
            gisInited = true;
            maybeEnableButtons();
        }

        function maybeEnableButtons() {
            if (gapiInited && gisInited) {
                // Check if user already has a valid token
                const token = gapi.client.getToken();
                if (token !== null) {
                    // User is already authenticated - enable the button!
                    document.getElementById('login-btn').style.display = 'none';
                    document.getElementById('user-name').style.display = 'inline';
                    document.getElementById('submitBtn').disabled = false;
                }
            }
        }

        function handleAuthClick() {
            tokenClient.callback = async (resp) => {
                if (resp.error !== undefined) {
                    throw (resp);
                }
                // Show logged in state
                document.getElementById('login-btn').style.display = 'none';
                document.getElementById('user-name').style.display = 'inline';
                document.getElementById('submitBtn').disabled = false;
                
                // Store token for service worker access
                const token = gapi.client.getToken();
                localStorage.setItem('googleAuthToken', JSON.stringify({
                    access_token: token.access_token,
                    expires_at: Date.now() + token.expires_in * 1000
                }));
            };

            if (gapi.client.getToken() === null) {
                // First time login
                tokenClient.requestAccessToken({prompt: 'consent'});
            } else {
                // Refresh token
                tokenClient.requestAccessToken({prompt: ''});
            }
        }

        // --- UPLOAD RESUMPTION LOGIC ---
        function checkExistingUploads() {
            const currentUpload = localStorage.getItem('currentUpload');
            if (currentUpload) {
                const upload = JSON.parse(currentUpload);
                document.getElementById('status').innerHTML = `⚠️ Previous upload detected: ${upload.fileName}`;
                document.getElementById('status').className = "error";
                
                // Show progress container with resume option
                document.getElementById('progressContainer').style.display = 'block';
                document.getElementById('pauseBtn').style.display = 'none';
                document.getElementById('resumeBtn').style.display = 'block';
                document.getElementById('cancelBtn').style.display = 'block';
                
                // Set upload state to allow resuming
                uploadState = {
                    uploadId: upload.uploadId,
                    subject: upload.subject,
                    pName: upload.pName
                };
            }
        }

        // --- UPLOAD CONTROLS ---
        function pauseUpload() {
            if (port && uploadId) {
                port.postMessage({
                    type: 'pause-upload',
                    uploadId: uploadId
                });
            }
        }

        function resumeUpload() {
            if (isCancelled) {
                document.getElementById('status').innerHTML = '❌ Upload was cancelled. Please restart.';
                return;
            }
            
            if (port && uploadId) {
                port.postMessage({
                    type: 'resume-upload',
                    uploadId: uploadId
                });
            }
        }

        function cancelUpload() {
            isCancelled = true;
            if (port && uploadId) {
                port.postMessage({
                    type: 'cancel-upload',
                    uploadId: uploadId
                });
            }
            localStorage.removeItem('currentUpload');
            document.getElementById('progressContainer').style.display = 'none';
            document.getElementById('status').innerHTML = '❌ Upload cancelled.';
            document.getElementById('status').className = 'error';
            document.getElementById('submitBtn').disabled = false;
        }

        // --- UPLOAD LOGIC ---
        async function handleUpload(e) {
            e.preventDefault();
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = "Processing...";
            statusDiv.className = "";

            const pName = document.getElementById('pName').value;
            let subject = document.getElementById('subjectSelect').value;
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            
            // Handle "Other" logic
            if (subject === 'Other') {
                subject = document.getElementById('customSubject').value.trim();
                // Capitalize first letter
                subject = subject.charAt(0).toUpperCase() + subject.slice(1);
                
                // Save to local storage list
                let savedSubjects = JSON.parse(localStorage.getItem('customSubjects') || "[]");
                if(!savedSubjects.includes(subject)) {
                    savedSubjects.push(subject);
                    localStorage.setItem('customSubjects', JSON.stringify(savedSubjects));
                    // Reload dropdown (optional visual update)
                    location.reload(); 
                }
            } else {
                // Ensure standard subjects are Capitalized too
                subject = subject.charAt(0).toUpperCase() + subject.slice(1);
            }

            const folderId = localStorage.getItem('driveFolderId');
            if (!folderId) {
                statusDiv.innerHTML = "Error: Please set Drive Folder ID in settings (⚙️).";
                statusDiv.className = "error";
                return;
            }

            try {
                // Check if Service Worker is ready
                if (!serviceWorkerReady) {
                    await setupServiceWorker();
                }

                // 1. Check if Subject Folder exists
                const listResponse = await gapi.client.drive.files.list({
                    q: `'${folderId}' in parents and name='${subject}' and mimeType='application/vnd.google-apps.folder' and trashed=false`,
                    fields: 'files(id, name)',
                    spaces: 'drive'
                });

                let targetFolderId = folderId;

                if (listResponse.result.files && listResponse.result.files.length > 0) {
                    // Folder exists
                    targetFolderId = listResponse.result.files[0].id;
                } else {
                    // 2. Create Folder if not exists
                    const folderMetadata = {
                        'name': subject,
                        'mimeType': 'application/vnd.google-apps.folder',
                        'parents': [folderId]
                    };
                    const createResponse = await gapi.client.drive.files.create({
                        resource: folderMetadata,
                        fields: 'id'
                    });
                    targetFolderId = createResponse.result.id;
                }

                // Prepare file metadata for upload
                const metadata = {
                    'name': `${pName}_${file.name}`,
                    'parents': [targetFolderId]
                };

                // Show progress container
                document.getElementById('progressContainer').style.display = 'block';
                document.getElementById('pauseBtn').style.display = 'block';
                document.getElementById('resumeBtn').style.display = 'none';
                document.getElementById('cancelBtn').style.display = 'block';
                document.getElementById('submitBtn').disabled = true;
                document.getElementById('status').innerHTML = '🔄 Starting upload...';

                // Send upload request to service worker
                if (port) {
                    port.postMessage({
                        type: 'start-upload',
                        file: file,
                        metadata: metadata,
                        chunkSize: CHUNK_SIZE,
                        accessToken: gapi.client.getToken().access_token
                    });
                }

            } catch (err) {
                console.error(err);
                statusDiv.innerHTML = "❌ Error: " + err.message;
                statusDiv.className = "error";
                document.getElementById('submitBtn').disabled = false;
            }
        }

        // Initialize when page loads
        window.addEventListener('load', async () => {
            // Setup service worker
            await setupServiceWorker();
            
            // Check authentication status when page loads
            if (gapiInited && gisInited) {
                maybeEnableButtons();
            }
        });

        // Service Worker registration script (inlined for simplicity)
        if ('serviceWorker' in navigator) {
            const swScript = `
                let uploadPort = null;
                let activeUploads = new Map(); // Map<uploadId, {file, metadata, chunkSize, accessToken, bytesUploaded}>
                let pausedUploads = new Set();
                
                // Create a unique ID for uploads
                function generateUploadId() {
                    return 'upload_' + Math.random().toString(36).substr(2, 9);
                }
                
                // Handle messages from the main page
                self.addEventListener('message', (event) => {
                    if (event.ports.length > 0) {
                        uploadPort = event.ports[0];
                        
                        uploadPort.onmessage = (msgEvent) => {
                            const { type, data } = msgEvent.data;
                            
                            switch (type) {
                                case 'start-upload':
                                    startResumableUpload(data);
                                    break;
                                case 'resume-upload':
                                    resumeUpload(data.uploadId);
                                    break;
                                case 'pause-upload':
                                    pauseUpload(data.uploadId);
                                    break;
                                case 'cancel-upload':
                                    cancelUpload(data.uploadId);
                                    break;
                            }
                        };
                    }
                });
                
                async function startResumableUpload({file, metadata, chunkSize, accessToken}) {
                    try {
                        const uploadId = generateUploadId();
                        const fileName = file.name;
                        
                        // Create resumable session
                        const sessionUrl = await createResumableSession(metadata, accessToken);
                        
                        // Store upload state
                        activeUploads.set(uploadId, {
                            file: file,
                            metadata: metadata,
                            chunkSize: chunkSize,
                            accessToken: accessToken,
                            sessionUrl: sessionUrl,
                            bytesUploaded: 0,
                            subject: metadata.parents.length > 0 ? '' : metadata.parents[0], // Simplified for example
                            pName: metadata.name.split('_')[0]
                        });
                        
                        // Notify main page of initial response
                        uploadPort.postMessage({
                            type: 'upload-initial-response',
                            data: {
                                uploadId: uploadId,
                                file: file,
                                subject: metadata.name.split('_')[0],
                                pName: metadata.name.split('_')[0]
                            }
                        });
                        
                        // Start uploading chunks
                        await uploadChunks(uploadId);
                        
                    } catch (error) {
                        uploadPort.postMessage({
                            type: 'upload-error',
                            data: { error: error.message }
                        });
                    }
                }
                
                async function createResumableSession(metadata, accessToken) {
                    const boundary = '-------314159265358979323846';
                    const delimiter = "\\r\\n--" + boundary + "\\r\\n";
                    const close_delim = "\\r\\n--" + boundary + "--";
                    
                    const contentType = metadata.mimeType || 'application/octet-stream';
                    const metadataRaw = JSON.stringify({
                        'name': metadata.name,
                        'parents': metadata.parents
                    });
                    
                    const multipartRequestBody =
                        delimiter +
                        'Content-Type: application/json\\r\\n\\r\\n' +
                        metadataRaw +
                        "\\r\\n" +
                        delimiter +
                        'Content-Type: ' + contentType + "\\r\\n" +
                        "Content-Transfer-Encoding: base64\\r\\n" +
                        "\\r\\n" +
                        close_delim;
                    
                    const xhr = new XMLHttpRequest();
                    xhr.open('POST', 'https://www.googleapis.com/upload/drive/v3/files?uploadType=resumable', true);
                    xhr.setRequestHeader('Authorization', 'Bearer ' + accessToken);
                    xhr.setRequestHeader('Content-Type', 'multipart/related; boundary="' + boundary + '"');
                    xhr.setRequestHeader('X-Upload-Content-Type', contentType);
                    
                    return new Promise((resolve, reject) => {
                        xhr.onload = function() {
                            if (xhr.status >= 200 && xhr.status < 300) {
                                const location = xhr.getResponseHeader('Location');
                                resolve(location);
                            } else {
                                reject(new Error('Failed to create resumable session: ' + xhr.responseText));
                            }
                        };
                        
                        xhr.onerror = function() {
                            reject(new Error('Network error while creating resumable session'));
                        };
                        
                        xhr.send(multipartRequestBody);
                    });
                }
                
                async function uploadChunks(uploadId) {
                    const upload = activeUploads.get(uploadId);
                    if (!upload) return;
                    
                    const { file, chunkSize, sessionUrl, bytesUploaded, accessToken } = upload;
                    let start = bytesUploaded;
                    let end = Math.min(start + chunkSize, file.size);
                    
                    while (start < file.size) {
                        // Check if upload is paused
                        if (pausedUploads.has(uploadId)) {
                            uploadPort.postMessage({
                                type: 'upload-paused',
                                data: { uploadId: uploadId }
                            });
                            return;
                        }
                        
                        // Check if upload is cancelled
                        if (!activeUploads.has(uploadId)) {
                            return;
                        }
                        
                        try {
                            const chunk = file.slice(start, end);
                            const chunkSize = end - start;
                            
                            // Upload the chunk
                            const xhr = new XMLHttpRequest();
                            xhr.open('PUT', sessionUrl, false); // Using sync to simplify example
                            xhr.setRequestHeader('Content-Type', 'application/octet-stream');
                            xhr.setRequestHeader('Content-Range', 'bytes ' + start + '-' + (end - 1) + '/' + file.size);
                            xhr.setRequestHeader('X-Upload-Content-Type', file.type);
                            
                            xhr.upload.onprogress = (e) => {
                                if (e.lengthComputable) {
                                    const totalUploaded = start + e.loaded;
                                    const progress = (totalUploaded / file.size) * 100;
                                    
                                    uploadPort.postMessage({
                                        type: 'upload-progress',
                                        data: {
                                            progress: progress,
                                            bytesUploaded: totalUploaded,
                                            totalBytes: file.size
                                        }
                                    });
                                }
                            };
                            
                            xhr.send(chunk);
                            
                            if (xhr.status === 308) {
                                // Get the range of bytes uploaded
                                const range = xhr.getResponseHeader('Range');
                                if (range) {
                                    start = parseInt(range.split('-')[1]) + 1;
                                } else {
                                    start = end;
                                }
                                end = Math.min(start + chunkSize, file.size);
                                
                                // Update bytes uploaded
                                upload.bytesUploaded = start;
                                activeUploads.set(uploadId, upload);
                            } else if (xhr.status === 200 || xhr.status === 201) {
                                // Upload complete
                                uploadPort.postMessage({
                                    type: 'upload-complete',
                                    data: {
                                        uploadId: uploadId,
                                        subject: upload.subject,
                                        pName: upload.pName
                                    }
                                });
                                
                                activeUploads.delete(uploadId);
                                return;
                            } else {
                                throw new Error('Upload failed with status: ' + xhr.status);
                            }
                        } catch (error) {
                            uploadPort.postMessage({
                                type: 'upload-error',
                                data: { error: error.message }
                            });
                            return;
                        }
                    }
                }
                
                function pauseUpload(uploadId) {
                    pausedUploads.add(uploadId);
                }
                
                function resumeUpload(uploadId) {
                    pausedUploads.delete(uploadId);
                    uploadPort.postMessage({
                        type: 'upload-resumed',
                        data: { uploadId: uploadId }
                    });
                    
                    // Continue uploading in the background
                    const upload = activeUploads.get(uploadId);
                    if (upload) {
                        uploadChunks(uploadId);
                    }
                }
                
                function cancelUpload(uploadId) {
                    activeUploads.delete(uploadId);
                    pausedUploads.delete(uploadId);
                    
                    uploadPort.postMessage({
                        type: 'upload-cancelled',
                        data: { uploadId: uploadId }
                    });
                }
            `;
            
            // Create a blob URL for the service worker script
            const blob = new Blob([swScript], {type: 'application/javascript'});
            const swUrl = URL.createObjectURL(blob);
            
            // Register the service worker from the blob URL
            navigator.serviceWorker.register(swUrl)
                .then(reg => console.log('Service Worker registered from blob'))
                .catch(err => console.error('Service Worker registration failed:', err));
        }
    </script>
